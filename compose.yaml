services:
  qr-generator:
    build: .
    container_name: qr-generator
    restart: unless-stopped
    user: "${APPUSER_PUID:-1000}:${APPUSER_PGID:-1000}"
    ports:
      - "8080:8080"
    environment:
      FLET_APP_STORAGE_DATA: /data
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      FROM_EMAIL: ${FROM_EMAIL:-}
    volumes:
      - qr-generator-data:/data

volumes:
  qr-generator-data:
